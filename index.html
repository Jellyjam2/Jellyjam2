<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>🜏 LUMINA-XENON: IGNITION</title>
        <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://w3.org viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🜏</text></svg>">
        <style>
            html, body { 
                margin: 0; padding: 0; width: 100%; height: 100%; 
                overflow: hidden; background-color: #050a0f; 
            }
            canvas { display: block; width: 100vw; height: 100vh; touch-action: none; }
        </style>
    </head>
    <body>
        <canvas id="the_canvas_id"></canvas>
    
        <script type="module">
            /**
             * ATOMIC NEURAL ALIGNMENT
             * We import directly from the .js and initialize the .wasm manually 
             * to skip the 'placeholder' error.
             */
            import init from './lumina_guardian.js';
            
            async function ignition() {
                try {
                    // This forces the engine to link directly to the WASM binary
                    await init('./lumina_guardian_bg.wasm');
                    console.log("🜏 LUMINA-XENON: Neural Manifold ACTIVE");
                    
                    const guardian = new Image();
                    guardian.src = './assets/lumina_bunny.png?v=' + Date.now();
                    guardian.onload = () => {
                        console.log("🜏 SUCCESS: Guardian Uncloaked.");
                        window.dispatchEvent(new Event('resize'));
                    };
                } catch (err) {
                    console.error("🜏 IGNITION FAILURE:", err);
                }
            }

            ignition();
        </script>
    </body>
</html>
