<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>SOVEREIGN CORE // LOGIC</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    
    <style>
        html, body {
            margin: 0;
            padding: 0;
            background-color: #000000; 
            height: 100%;
            width: 100%;
            overflow: hidden; 
            font-family: 'Courier New', monospace;
        }
        canvas { 
            display: block; 
            position: absolute; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            z-index: 1; 
        }
        #status {
            position: absolute; bottom: 20px; left: 20px;
            color: #00ffff; /* CYAN for Logic Core */
            font-size: 14px; z-index: 10;
            pointer-events: none;
            text-shadow: 0 0 5px #00ffff;
        }
    </style>

    <link data-trunk rel="rust" data-wasm-opt="z" />
    
    <script type="module">
        // === THE LOGIC CORE (NO DOWNLOAD REQUIRED) ===
        window.sovereign = {};
        let hasGreeted = false;

        // 1. VOCAL SYNTHESIS (The Voice)
        let luminaVoices = [];

        function refreshLuminaVoices() {
            if (!window.speechSynthesis) return [];
            luminaVoices = window.speechSynthesis.getVoices() || [];
            return luminaVoices;
        }

        function selectLuminaVoice() {
            const voices = luminaVoices.length ? luminaVoices : refreshLuminaVoices();

            const preferredNames = [
                "Microsoft Aria Online",
                "Microsoft Jenny Online",
                "Microsoft Guy Online",
                "Microsoft Zira",
                "Microsoft Hazel",
                "Microsoft David",
                "Google UK English Female",
                "Google UK English Male",
                "Google US English",
                "Natural"
            ];

            for (const name of preferredNames) {
                const match = voices.find(v =>
                    v.name.toLowerCase().includes(name.toLowerCase())
                );
                if (match) return match;
            }

            return voices.find(v => v.lang && v.lang.toLowerCase().startsWith("en")) || voices[0] || null;
        }

        refreshLuminaVoices();

        if (window.speechSynthesis) {
            window.speechSynthesis.onvoiceschanged = refreshLuminaVoices;
        }

        function speakJarvis(text) {
            if (!window.speechSynthesis) return;

            window.speechSynthesis.cancel();

            const msg = new SpeechSynthesisUtterance(text);
            const voice = selectLuminaVoice();

            if (voice) {
                msg.voice = voice;
            }

            msg.rate = 0.92;
            msg.pitch = 0.82;
            msg.volume = 1.0;

            window.speechSynthesis.speak(msg);
        }

        // 2. THE LOGIC BRAIN (Pattern Matching)
        // This replaces the heavy AI with instant logic
        window.sovereign.processInput = async function(text) {
            const status = document.getElementById("status");
            status.innerText = ">> ANALYZING LOGIC GATE...";
            
            const input = text.toLowerCase().trim();
            let response = "";

            // --- THE CONVERSATION TREE ---
            if (input.includes("hello") || input.includes("hi")) {
                response = "Greetings, Enrico. The Logic Core is active.";
            } 
            else if (input.includes("status") || input.includes("report")) {
                response = "Systems nominal. Vortex Engine holding at 98 percent efficiency.";
            } 
            else if (input.includes("who are you") || input.includes("identify")) {
                response = "I am Lumina. A Sovereign Construct designed for Enrico.";
            } 
            else if (input.includes("mission") || input.includes("objective")) {
                response = "My mission is to protect the digital borders of this terminal.";
            }
            else if (input.includes("thank")) {
                response = "You are welcome, Enrico.";
            }
            else if (input.includes("weather")) {
                response = "I do not have atmospheric sensors connected yet, sir.";
            }
            else if (input === "jarvis") {
                response = "I am faster than Jarvis. I am Lumina.";
            }
            else {
                // Fallback for unknown commands
                const Fallbacks = [
                    "Command logged, Enrico.",
                    "Processing input.",
                    "I am listening.",
                    "Data received."
                ];
                response = Fallbacks[Math.floor(Math.random() * Fallbacks.length)];
            }
            // -----------------------------

            console.log("LUMINA SAYS:", response);
            status.innerText = ">> RESPONSE SENT";
            speakJarvis(response);
            
            // Reset text after 2 seconds
            setTimeout(() => {
                status.innerText = ">> LOGIC CORE: ONLINE";
            }, 2000);
        };

        // Initialization
        window.addEventListener('click', () => {
            if (!hasGreeted) {
                speakJarvis("Logic Core Online. Welcome back, Enrico.");
                hasGreeted = true;
                document.getElementById("status").innerText = ">> LOGIC CORE: ONLINE";
            }
        }, { once: true });

    </script>
</head>
<body>
    <div id="status">>> SYSTEM READY. CLICK TO INITIALIZE LOGIC CORE.</div>
    <canvas id="the_canvas_id"></canvas>
</body>
</html>
