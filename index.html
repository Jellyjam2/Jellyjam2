<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>🜏 LUMINA-XENON: THE GUARDIAN</title>
        <style>
            html, body { 
                margin: 0; 
                padding: 0; 
                width: 100%; 
                height: 100%; 
                overflow: hidden; 
                background-color: #050a0f; 
            }
            canvas { 
                display: block;
                width: 100vw; 
                height: 100vh; 
            }
        </style>
    </head>
    <body>
        <canvas id="the_canvas_id"></canvas>
    
        <script type="module">
            // We use relative paths './' to ensure GitHub Pages finds the files 
            // regardless of the repository name.
            import init from './lumina_guardian.js';
            
            async function ignition() {
                try {
                    // This triggers the WASM engine ignition
                    await init('./lumina_guardian_bg.wasm');
                    console.log("LUMINA-XENON: Neural Manifold ACTIVE");
                } catch (err) {
                    console.error("LUMINA-XENON: Ignition Failure", err);
                }
            }

            ignition();
        </script>
    </body>
</html>
