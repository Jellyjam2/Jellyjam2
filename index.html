<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>🜏 LUMINA-XENON: THE GUARDIAN</title>
        <style>
            html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #050a0f; }
            canvas { display: block; width: 100vw; height: 100vh; touch-action: none; }
        </style>
    </head>
    <body>
        <canvas id="the_canvas_id"></canvas>
    
        <script type="module">
            // We use the full initialization sequence to fix the __wbindgen_placeholder__ error
            import init, { set_panic_hook } from './lumina_guardian.js';
            
            async function ignition() {
                try {
                    // This configuration object satisfies the latest Rust/WASM requirements
                    await init({ module_or_path: './lumina_guardian_bg.wasm' });
                    
                    if (typeof set_panic_hook === 'function') {
                        set_panic_hook();
                    }
                    
                    console.log("🜏 LUMINA-XENON: Neural Manifold ACTIVE");

                    // MANIFEST GUARDIAN
                    const guardian = new Image();
                    guardian.src = './assets/lumina_bunny.png?v=' + Date.now();
                    guardian.onload = () => {
                        console.log("🜏 SUCCESS: Guardian Uncloaked.");
                        window.dispatchEvent(new Event('resize'));
                    };

                } catch (err) {
                    console.error("🜏 IGNITION FAILURE:", err);
                    console.log("Pro-tip: Try opening in an Incognito window to clear the WASM cache.");
                }
            }

            ignition();
        </script>
    </body>
</html>
