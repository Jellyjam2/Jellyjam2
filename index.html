<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>🜏 LUMINA-XENON: THE GUARDIAN</title>
        <style>
            html, body { 
                margin: 0; 
                padding: 0; 
                width: 100%; 
                height: 100%; 
                overflow: hidden; 
                background-color: #050a0f; 
            }
            canvas { 
                display: block;
                width: 100vw; 
                height: 100vh; 
            }
        </style>
    </head>
    <body>
        <canvas id="the_canvas_id"></canvas>
    
        <script type="module">
            /**
             * NEURAL IGNITION SEQUENCE (FINAL CALIBRATION)
             * We calculate the absolute path to the WASM binary to avoid any subdirectory 404s.
             */
            const path = window.location.pathname;
            const base = path.substring(0, path.lastIndexOf('/'));
            const wasmPath = `${window.location.origin}${base}/lumina_guardian_bg.wasm`;

            import init from './lumina_guardian.js';
            
            async function ignition() {
                try {
                    // NEW: We pass a single configuration object to resolve the deprecation warning.
                    await init({ module_or_path: wasmPath });
                    console.log("LUMINA-XENON: Neural Manifold ACTIVE");
                } catch (err) {
                    console.error("LUMINA-XENON: Ignition Failure", err);
                }
            }

            ignition();
        </script>
    </body>
</html>
