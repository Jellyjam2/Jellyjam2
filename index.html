<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>🜏 LUMINA: SOVEREIGN TRINITY</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    
    <!-- SILO A: VISUALS (Handled by Trunk) -->
    <!-- Trunk automatically injects the JS loader here. Do not add your own init() script. -->
    <link data-trunk rel="rust" data-wasm-opt="2" />
    
    <style>
        /* CRITICAL CSS: Removes scrollbars and centers the HUD */
        body { margin: 0; background: #050a0f; overflow: hidden; font-family: monospace; }
        canvas { width: 100%; height: 100%; display: block; }
        
        #hub {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 600px; padding: 15px;
            background: rgba(5, 10, 15, 0.9);
            border: 1px solid #00ffaa;
            color: #00ffaa;
            font-family: 'Courier New', Courier, monospace;
            display: flex; flex-direction: column; gap: 10px;
            box-shadow: 0 0 30px rgba(0, 255, 170, 0.1);
            pointer-events: auto; /* Ensure we can type */
        }

        #status-line {
            font-size: 11px; opacity: 0.8; letter-spacing: 1px;
            border-bottom: 1px solid #004433; padding-bottom: 5px;
        }

        input { 
            width: 100%; background: transparent; border: none; 
            color: white; font-size: 14px; outline: none; font-family: inherit;
        }
        
        .error { color: #ff3333; }
        .success { color: #00ffaa; }
    </style>

    <!-- SILO B: INTELLIGENCE (Async Loader) -->
    <script type="module">
        // 1. Define the AI Source (Using the specific package path)
        const CDN_URL = "https://esm.run/@mlc-ai/web-llm";
        const MODEL = "Llama-3.2-1B-Instruct-q4f16_1-MLC";

        // 2. The Bridge Finder (Connects JS to Rust)
        // We poll the window object until Trunk finishes loading the WASM
        async function findNeuralLink() {
            let attempts = 0;
            return new Promise((resolve, reject) => {
                const check = setInterval(() => {
                    attempts++;
                    // Trunk exposes 'wasm_bindgen' globally in most configs
                    if (window.wasm_bindgen && window.wasm_bindgen.dispatch_neural_command) {
                        clearInterval(check);
                        resolve(window.wasm_bindgen);
                    } else if (attempts > 100) {
                        // Timeout after 10 seconds
                        clearInterval(check);
                        reject("Rust Engine not found.");
                    }
                }, 100);
            });
        }

        // 3. The Ignition Sequence
        async function ignite() {
            const status = document.getElementById('status-text');
            
            try {
                status.innerText = "SEARCHING FOR RUST MANIFOLD...";
                
                // Wait for Trunk to boot the WASM
                const rustBridge = await findNeuralLink();
                window.rustBridge = rustBridge; // Save for later
                
                status.innerText = "RUST ENGINE LOCKED. INITIALIZING AI...";
                
                // Load the AI Library dynamically
                // If this fails (CORS/Network), it jumps to 'catch' and keeps the 3D running
                const webllm = await import(CDN_URL);
                
                const engine = await webllm.CreateMLCEngine(MODEL, {
                    initProgressCallback: (report) => {
                        status.innerText = `LOADING CORE: ${report.text}`;
                    }
                });

                window.aiEngine = engine; // Save for later
                status.innerText = "🜏 TRINITY ONLINE: VISUALS + LOGIC + AI";
                status.className = "success";

            } catch (e) {
                console.error(e);
                // If AI fails, we still have the visuals!
                status.innerText = "OFFLINE MODE: " + e.message;
                status.className = "error";
            }
        }

        // 4. Input Handler
        window.handleInput = async (e) => {
            if (e.key === 'Enter') {
                const input = e.target.value;
                const engine = window.aiEngine;
                const bridge = window.rustBridge;

                // Visual Feedback immediately
                e.target.value = "PROCESSING...";
                e.target.disabled = true;

                if (!engine) {
                    // If offline, we can fake it or just log
                    console.log("AI Offline. Ignoring command.");
                    e.target.value = "ERROR: NEURAL OFFLINE";
                    e.target.disabled = false;
                    return;
                }

                try {
                    // The System Prompt (The translator)
                    const prompt = `
                    You are the OS. Output JSON only.
                    Controls: { r: 0-255, g: 0-255, b: 0-255, speed: float, reveal: bool }
                    User: "${input}"
                    `;
                    
                    const reply = await engine.chat.completions.create({
                        messages: [{ role: "user", content: prompt }]
                    });
                    
                    // Clean and Parse
                    const cleanJson = reply.choices[0].message.content.replace(/```json|```/g, "").trim();
                    const cmd = JSON.parse(cleanJson);
                    
                    // EXECUTE
                    if (bridge) {
                        bridge.dispatch_neural_command(cmd.r, cmd.g, cmd.b, cmd.speed, cmd.reveal);
                    }
                    
                    e.target.value = "";
                } catch(err) {
                    console.error("Neural Parse Error", err);
                    e.target.value = "ERROR (Check Console)";
                } finally {
                    e.target.disabled = false;
                    e.target.focus();
                }
            }
        };

        // Boot on load
        window.onload = ignite;
    </script>
</head>
<body>
    <!-- The Canvas is empty; Trunk injects the WASM here automatically -->
    <canvas id="the_canvas_id"></canvas>

    <div id="hub">
        <div id="status-line">
            STATUS: <span id="status-text">SYSTEM BOOT...</span>
        </div>
        <input type="text" placeholder="Enter command (e.g. 'Red Alert', 'Spin fast')" onkeydown="window.handleInput(event)">
    </div>
</body>
</html>
