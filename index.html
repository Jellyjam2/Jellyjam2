<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>🜏 LUMINA-XENON: THE GUARDIAN</title>
        <style>
            html, body { 
                margin: 0; 
                padding: 0; 
                width: 100%; 
                height: 100%; 
                overflow: hidden; 
                background-color: #050a0f; 
            }
            canvas { 
                display: block;
                width: 100vw; 
                height: 100vh; 
                touch-action: none;
            }
        </style>
    </head>
    <body>
        <!-- This is the window into the Neural Manifold -->
        <canvas id="the_canvas_id"></canvas>
    
        <script type="module">
            import init from './lumina_guardian.js';
            
            async function ignition() {
                try {
                    // 1. Ignite the Rust/WASM Engine
                    // We use a relative path './' so it works within the /jellyjam2/ folder
                    await init({ module_or_path: './lumina_guardian_bg.wasm' });
                    console.log("🜏 LUMINA-XENON: Neural Manifold ACTIVE");
                    
                    // 2. Force-load the Guardian Asset (The Bunny)
                    // We add a timestamp to the URL to bypass the GitHub Cache Loop
                    const guardian = new Image();
                    guardian.src = './assets/lumina_bunny.png?v=' + Date.now();
                    
                    guardian.onload = () => {
                        console.log("🜏 LUMINA-XENON: Guardian Asset UNCLOAKED");
                    };

                } catch (err) {
                    console.error("🜏 LUMINA-XENON: Logic Breach", err);
                    
                    // FALLBACK: If the relative path fails, try the absolute origin
                    try {
                        const path = window.location.pathname;
                        const dir = path.substring(0, path.lastIndexOf('/'));
                        const wasmPath = `${window.location.origin}${dir}/lumina_guardian_bg.wasm`;
                        await init({ module_or_path: wasmPath });
                    } catch (e) {
                        console.log("Final Manifestation attempt failed. Check file naming.");
                    }
                }
            }

            ignition();
        </script>
    </body>
