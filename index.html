<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>🜏 LUMINA-XENON: THE GUARDIAN</title>
        <!-- Favicon Fix to stop the 404 noise -->
        <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://w3.org viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🜏</text></svg>">
        <style>
            html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #050a0f; }
            canvas { display: block; width: 100vw; height: 100vh; touch-action: none; }
        </style>
    </head>
    <body>
        <canvas id="the_canvas_id"></canvas>
    
        <script type="module">
            /**
             * NEURAL PATH ALIGNMENT
             * We calculate the absolute folder path to ensure the JS and WASM ignite.
             */
            const path = window.location.pathname;
            const base = path.substring(0, path.lastIndexOf('/'));
            
            // We use the full calculated path for the import
            import init from './lumina_guardian.js';
            
            async function ignition() {
                try {
                    // Points directly to the binary using the same base path
                    await init(`${base}/lumina_guardian_bg.wasm`);
                    console.log("🜏 LUMINA-XENON: Neural Manifold ACTIVE");
                    
                    // Manifest the Bunny
                    const guardian = new Image();
                    guardian.src = `${base}/assets/lumina_bunny.png?v=${Date.now()}`;
                    guardian.onload = () => {
                        console.log("🜏 SUCCESS: Guardian Uncloaked.");
                        window.dispatchEvent(new Event('resize'));
                    };

                } catch (err) {
                    console.error("🜏 IGNITION FAILURE:", err);
                }
            }

            ignition();
        </script>
    </body>
</html>
