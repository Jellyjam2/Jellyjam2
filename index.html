<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>🜏 LUMINA-XENON: THE GUARDIAN</title>
        <style>
            html, body { 
                margin: 0; 
                padding: 0; 
                width: 100%; 
                height: 100%; 
                overflow: hidden; 
                background-color: #050a0f; 
            }
            canvas { 
                display: block;
                width: 100vw; 
                height: 100vh; 
                touch-action: none;
            }
        </style>
    </head>
    <body>
        <!-- The Window into the 3D Manifold -->
        <canvas id="the_canvas_id"></canvas>
    
        <script type="module">
            /**
             * NEURAL IGNITION SEQUENCE
             * Optimized for GitHub Pages subfolder routing.
             */
            import init from './lumina_guardian.js';
            
            async function ignition() {
                try {
                    // 1. Ignite the Rust/WASM Engine
                    await init({ module_or_path: './lumina_guardian_bg.wasm' });
                    console.log("🜏 LUMINA-XENON: Neural Manifold ACTIVE");
                    
                    // 2. Asset Manifestation
                    const guardian = new Image();
                    // Using a timestamp to bypass the GitHub Cache Loop
                    guardian.src = './assets/lumina_bunny.png?v=' + Date.now();
                    
                    guardian.onload = () => {
                        console.log("🜏 LUMINA-XENON: Guardian Asset UNCLOAKED");
                        // Triggers the engine to re-center the 3D camera
                        window.dispatchEvent(new Event('resize'));
                    };

                } catch (err) {
                    console.error("🜏 LUMINA-XENON: Ignition Failure", err);
                    
                    // FALLBACK: Force absolute path calculation
                    try {
                        const path = window.location.pathname;
                        const dir = path.substring(0, path.lastIndexOf('/'));
                        const wasmPath = `${window.location.origin}${dir}/lumina_guardian_bg.wasm`;
                        await init({ module_or_path: wasmPath });
                    } catch (finalErr) {
                        console.log("Neural Link Breach: Check file naming.");
                    }
                }
            }

            ignition();
        </script>
    </body>
</html>
