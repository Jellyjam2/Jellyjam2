<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>🜏 LUMINA: SABIR-KHN ARCHIVE</title>
    <style>
        /* THE CRITICAL FIX: Forces the browser to give the engine space */
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background-color: #050a0f; 
        }
        canvas { 
            display: block; width: 100vw; height: 100vh; 
        }
        
        #hub {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 700px; padding: 15px;
            background: rgba(0, 15, 10, 0.9); border: 1px solid #00ffaa;
            display: none; z-index: 100; box-shadow: 0 0 20px #00ffaa33;
            color: #00ffaa; font-family: monospace;
        }
        #status { font-size: 10px; margin-bottom: 5px; opacity: 0.7; }
    </style>

    <!-- PYTHON CORE -->
    <script src="https://jsdelivr.net"></script>
    
    <script type="module">
        // FIX: Using a more stable CDN for the AI engine
        import * as webllm from "https://jsdelivr.net";
        import init, * as bindings from './lumina_guardian.js';

        let engine;
        const synth = window.speechSynthesis;

        async function ignite() {
            const status = document.getElementById("status");
            try {
                status.innerText = "🜏 IGNITING RUST ENGINE...";
                await init(); 
                window.wasmBindings = bindings;
                
                status.innerText = "🜏 LOADING PYTHON...";
                await loadPyodide();
                
                status.innerText = "🜏 LOADING LLAMA 3.2 [BRAIN]...";
                engine = await webllm.CreateMLCEngine("Llama-3.2-1B-Instruct-q4f16_1-MLC", { 
                    initProgressCallback: (r) => { status.innerText = r.text; }
                });
                
                document.getElementById("hub").style.display = "block";
                status.innerText = "🜏 SABIR-KHN ARCHIVE ONLINE";
            } catch (e) {
                status.innerText = "ERROR: " + e.message;
                console.error(e);
            }
        }

        window.handleInput = async (e) => {
            if (e.key === 'Enter') {
                const text = e.target.value; e.target.value = "";
                const systemPrompt = `You are the K-H-N Archivist. Output ONLY JSON: {'r':0-255,'g':255,'b':255,'speed':0.01,'reveal':true,'speech':'...'}`;
                const reply = await engine.chat.completions.create({ 
                    messages: [{role: "system", content: systemPrompt}, {role: "user", content: text}] 
                });
                const cmd = JSON.parse(reply.choices.message.content.replace(/```json|```/g, ""));
                if (window.wasmBindings) window.wasmBindings.dispatch_neural_command(cmd.r, cmd.g, cmd.b, cmd.speed, cmd.reveal);
                synth.speak(new SpeechSynthesisUtterance(cmd.speech));
            }
        };
        ignite();
    </script>
</head>
<body>
    <canvas id="the_canvas_id"></canvas>
    <div id="hub">
        <div id="status">INITIATING BOOT...</div>
        <input type="text" placeholder="Command the Archive..." onkeydown="handleInput(event)" 
               style="width:100%; background:none; border:none; color:white; outline:none; font-family:monospace;">
    </div>
</body>
</html>
