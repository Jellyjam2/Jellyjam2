<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>🜏 LUMINA: SOVEREIGN CORE</title>
    <style>
        /* CRITICAL: Forces the 3D world to have space to grow */
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background-color: #050a0f; 
        }
        canvas { 
            display: block; width: 100vw; height: 100vh; 
        }
        
        #hub {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 600px; padding: 15px;
            background: rgba(0, 15, 10, 0.9); border: 1px solid #00ffaa;
            display: block; z-index: 100; color: #00ffaa; font-family: monospace;
        }
    </style>

    <script type="module">
        /**
         * CORE IGNITION
         * This script bypasses all external AI servers to launch the Rust Engine directly.
         */
        import init, * as bindings from './lumina_guardian.js';

        async function ignite() {
            const status = document.getElementById("status");
            try {
                status.innerText = "🜏 SYNCING RUST BRIDGE...";
                
                // Pointing directly to your local repository binary
                await init('./lumina_guardian_bg.wasm'); 
                window.wasmBindings = bindings;
                
                status.innerText = "🜏 CORE ONLINE // MANIFOLD ACTIVE";
            } catch (e) {
                status.innerText = "NEURAL BREACH: " + e.message;
                console.error("Ignition Error:", e);
            }
        }
        ignite();
    </script>
</head>
<body>
    <canvas id="the_canvas_id"></canvas>
    
    <div id="hub">
        <div id="status">INITIATING SOVEREIGN BOOT...</div>
        <div style="font-size: 10px; margin-top: 5px; opacity: 0.5;">
            Hardware: i3-4030U // RAM: 8GB // Target: WASM-32
        </div>
    </div>
</body>
</html>
