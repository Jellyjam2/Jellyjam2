<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>🜏 LUMINA: SABIR-KHN ARCHIVE</title>
    <style>
        /* Forces the canvas to occupy the full screen */
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #050a0f; }
        canvas { display: block; width: 100vw; height: 100vh; }
        
        #hub {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 600px; padding: 15px;
            background: rgba(0, 15, 10, 0.9); border: 1px solid #00ffaa;
            display: none; z-index: 100; color: #00ffaa; font-family: monospace;
        }
        #status { font-size: 10px; margin-bottom: 5px; opacity: 0.7; }
    </style>

    <!-- PYTHON CORE (Using a more stable global link) -->
    <script src="https://unpkg.com"></script>
    
    <script type="module">
        // Using a highly-stable ESM link for the AI engine
        import * as webllm from "https://esm.run";
        
        // --- DYNAMIC NEURAL PATHING ---
        // This finds your files even if GitHub puts them in a subfolder
        const currentPath = window.location.pathname;
        const basePath = currentPath.substring(0, currentPath.lastIndexOf('/') + 1);

        async function ignite() {
            const status = document.getElementById("status");
            try {
                status.innerText = "🜏 SYNCING RUST BRIDGE...";
                
                // We import the logic from the current repository path
                const { default: init, dispatch_neural_command } = await import(`${basePath}lumina_guardian.js`);
                await init(`${basePath}lumina_guardian_bg.wasm`);
                window.wasmBindings = { dispatch_neural_command };
                
                status.innerText = "🜏 AWAKENING PYTHON...";
                await loadPyodide();
                
                status.innerText = "🜏 DOWNLOADING BRAIN [LLAMA 3.2]...";
                const engine = await webllm.CreateMLCEngine("Llama-3.2-1B-Instruct-q4f16_1-MLC", { 
                    initProgressCallback: (r) => { status.innerText = r.text; }
                });
                
                document.getElementById("hub").style.display = "block";
                status.innerText = "🜏 SABIR-KHN ARCHIVE ONLINE";
            } catch (e) {
                status.innerText = "NEURAL BREACH: " + e.message;
                console.error("Ignition Error:", e);
            }
        }
        ignite();
    </script>
</head>
<body>
    <canvas id="the_canvas_id"></canvas>
    <div id="hub">
        <div id="status">INITIATING BOOT...</div>
        <input type="text" placeholder="Command the Archive..." style="width:100%; background:none; border:none; color:white; outline:none;">
    </div>
</body>
</html>
