<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>SOVEREIGN CORE // ENRICO</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    
    <style>
        html, body {
            margin: 0;
            padding: 0;
            background-color: #000000; 
            height: 100%;
            width: 100%;
            overflow: hidden; 
            font-family: 'Courier New', monospace;
        }
        canvas { 
            display: block; 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            z-index: 1; 
        }
        #status {
            position: absolute; bottom: 20px; left: 20px;
            color: #ffaa00; /* Amber for Nano Core */
            font-size: 14px; z-index: 10;
            pointer-events: none;
            text-shadow: 0 0 5px #ffaa00;
        }
    </style>

    <link data-trunk rel="rust" data-wasm-opt="z" />
    
    <script type="module">
        import * as webllm from "https://esm.run/@mlc-ai/web-llm";

        // === SOVEREIGN GLOBAL STATE ===
        window.sovereign = {};
        let engine = null;
        let hasGreeted = false;

        // 1. VOCAL SYNTHESIS (The Voice)
        function speakJarvis(text) {
            if (!window.speechSynthesis) return;
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            const voices = window.speechSynthesis.getVoices();
            const voice = voices.find(v => v.name.includes("Google UK English Male")) || voices[0];
            msg.voice = voice;
            msg.rate = 1.1; // Faster for Nano Core
            msg.pitch = 1.0; 
            window.speechSynthesis.speak(msg);
        }

        // 2. THE NANO BRAIN (Qwen2 0.5B)
        // This is the "Shrunk" Model - 60% Smaller than Llama
        async function igniteBrain() {
            const status = document.getElementById("status");
            status.innerText = ">> INITIATING OMEGA BLITZ COMPRESSION...";
            
            // NANO-CORE CONFIGURATION
            const selectedModel = "Qwen2-0.5B-Instruct-q4f16_1-MLC";
            
            engine = await webllm.CreateMLCEngine(
                selectedModel,
                { initProgressCallback: (p) => {
                    // Show precise progress
                    status.innerText = `>> COMPRESSING NEURAL WEIGHTS: ${(p.progress * 100).toFixed(1)}%`;
                }}
            );
            
            status.innerText = ">> NANO CORE: ONLINE. 1MS LATENCY ACHIEVED.";
            console.log("Nano Engine Ready");
        }

        window.sovereign.processInput = async function(text) {
            const status = document.getElementById("status");
            
            // Fast Path
            if (text.toLowerCase() === "status") {
                speakJarvis("Nano Core active. Memory pressure minimal.");
                return;
            }

            // Smart Path
            if (!engine) {
                speakJarvis("Calibrating Nano Core. Stand by.");
                await igniteBrain();
            }

            status.innerText = ">> CALCULATING...";
            
            const systemPrompt = `
            You are LUMINA (Nano-Version). Concise, fast, loyal.
            User is 'Enerico'. Keep answers under 15 words.
            `;

            const messages = [
                { role: "system", content: systemPrompt },
                { role: "user", content: text }
            ];

            const reply = await engine.chat.completions.create({ messages });
            const responseText = reply.choices[0].message.content;

            status.innerText = ">> RESPONSE SENT";
            speakJarvis(responseText);
        };

        window.addEventListener('click', () => {
            if (!hasGreeted) {
                speakJarvis("Protocol Omega active. Nano Core ready, Enerico.");
                hasGreeted = true;
                if (!engine) igniteBrain(); 
            }
        }, { once: true });

    </script>
</head>
<body>
    <div id="status">>> SYSTEM READY. CLICK TO ENGAGE NANO CORE.</div>
    <canvas id="the_canvas_id"></canvas>
</body>
</html>
