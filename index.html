<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>🜏 LUMINA-XENON: THE GUARDIAN</title>
        <style>
            html, body { 
                margin: 0; 
                padding: 0; 
                width: 100%; 
                height: 100%; 
                overflow: hidden; 
                background-color: #050a0f; 
            }
            canvas { 
                display: block;
                width: 100vw; 
                height: 100vh; 
                touch-action: none;
            }
        </style>
    </head>
    <body>
        <canvas id="the_canvas_id"></canvas>
    
        <script type="module">
            const path = window.location.pathname;
            const directory = path.substring(0, path.lastIndexOf('/'));
            const origin = window.location.origin;
            
            // This ensures the engine looks in /jellyjam2/assets/ for the bunny
            const fullWasmPath = `${origin}${directory}/lumina_guardian_bg.wasm`;

            import init from './lumina_guardian.js';
            
            async function ignition() {
                try {
                    await init({ module_or_path: fullWasmPath });
                    console.log("LUMINA-XENON: Neural Manifold ACTIVE");
                } catch (err) {
                    console.error("LUMINA-XENON: Ignition Failure", err);
                }
            }

            ignition();
        </script>
    </body>
</html>
