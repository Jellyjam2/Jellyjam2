    <style>
        body { margin: 0; background: #050a0f; overflow: hidden; font-family: monospace; }
        canvas { width: 100%; height: 100%; display: block; }
        
        #hub {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 600px; padding: 15px;
            background: rgba(5, 10, 15, 0.9);
            border: 1px solid #00ffaa; color: #00ffaa;
            font-family: 'Courier New', Courier, monospace;
            display: flex; flex-direction: column; gap: 10px;
            box-shadow: 0 0 40px rgba(0, 255, 170, 0.1);
        }
        #status-text { font-size: 11px; letter-spacing: 1px; }
        input { width: 100%; background: transparent; border: none; color: white; outline: none; }
        .error { color: #ff5555; } .success { color: #00ffaa; }

    <script type="module">
        const AI_LIB = "https://esm.run/@mlc-ai/web-llm";
        const MODEL = "Llama-3.2-1B-Instruct-q4f16_1-MLC";

        // 1. THE BRIDGE HUNTER
        // We look for the function that Rust manually attached to 'window'
        async function findNeuralBridge() {
            return new Promise((resolve, reject) => {
                let attempts = 0;
                const scanner = setInterval(() => {
                    attempts++;
                    if (window.dispatch_neural_command) { // FOUND IT!
                        clearInterval(scanner);
                        resolve(window.dispatch_neural_command);
                    } else if (attempts > 100) {
                        clearInterval(scanner);
                        reject("RUST CORE NOT DETECTED");
                    }
                }, 100);
            });
        }

        // 2. IGNITION
        async function ignite() {
            const status = document.getElementById('status-text');
            try {
                status.innerText = "CONNECTING TO RUST MANIFOLD...";
                const bridge = await findNeuralBridge();
                // We bind it to a convenient global for the input handler
                window.rust_bridge = bridge;
                
                status.innerText = "VISUALS SECURE. LOADING AI BRAIN...";
                const webllm = await import(AI_LIB);
                const engine = await webllm.CreateMLCEngine(MODEL, {
                    initProgressCallback: (r) => status.innerText = `LOADING: ${r.text}`
                });
                
                window.ai_engine = engine;
                status.innerText = "🜏 SYSTEM ONLINE: READY";
                status.className = "success";
            } catch (e) {
                console.error(e);
                status.innerText = "OFFLINE MODE: " + e;
                status.className = "error";
            }
        }

        // 3. TRANSLATOR
        window.handleInput = async (e) => {
            if (e.key !== 'Enter') return;
            const txt = e.target.value;
            e.target.value = "PROCESSING..."; e.target.disabled = true;

            try {
                if (!window.ai_engine) throw "AI MISSING";
                
                const res = await window.ai_engine.chat.completions.create({
                    messages: [{role:"system", content:`Output JSON only. Controls: {r:0-255, g:0-255, b:0-255, speed:float, reveal:bool}. User: "${txt}"`}]
                });
                
                const cmd = JSON.parse(res.choices[0].message.content.replace(/```json|```/g, "").trim());
                
                // EXECUTE
                if (window.rust_bridge) {
                    window.rust_bridge(cmd.r, cmd.g, cmd.b, cmd.speed, cmd.reveal);
                }
                e.target.value = "";
            } catch(err) {
                console.error(err);
                e.target.value = "ERROR";
            }
            e.target.disabled = false; e.target.focus();
        }

        window.onload = ignite;
    </script>
