<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>🜏 LUMINA: SABIR-KHN ARCHIVE</title>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #050a0f; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #hub {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 600px; padding: 15px;
            background: rgba(0, 15, 10, 0.9); border: 1px solid #00ffaa;
            display: none; z-index: 100; color: #00ffaa; font-family: monospace;
        }
    </style>

    <!-- PYTHON CORE (Stable Link) -->
    <script src="https://jsdelivr.net"></script>
    
    <script type="module">
        // Using a different, more "open" link for the AI engine to bypass CORS
        import * as webllm from "https://esm.run";
        
        // Use a relative import to ensure GitHub finds the JS file
        import init, * as bindings from './lumina_guardian.js';

        async function ignite() {
            const status = document.getElementById("status");
            try {
                // Point directly to the binary file
                await init('./lumina_guardian_bg.wasm'); 
                window.wasmBindings = bindings;
                
                await loadPyodide();
                
                // Initialize the AI
                const engine = await webllm.CreateMLCEngine("Llama-3.2-1B-Instruct-q4f16_1-MLC", { 
                    initProgressCallback: (r) => { console.log(r.text); }
                });
                
                document.getElementById("hub").style.display = "block";
            } catch (e) {
                console.error("Ignition Error:", e);
            }
        }
        ignite();
    </script>
</head>
<body>
    <canvas id="the_canvas_id"></canvas>
    <div id="hub">
        <div id="status">SABIR-KHN ARCHIVE: READY</div>
        <input type="text" placeholder="Command the Archive..." style="width:100%; background:none; border:none; color:white; outline:none;">
    </div>
</body>
</html>
