<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>🜏 LUMINA-XENON: THE GUARDIAN</title>
        <style>
            html, body { 
                margin: 0; 
                padding: 0; 
                width: 100%; 
                height: 100%; 
                overflow: hidden; 
                background-color: #050a0f; 
            }
            canvas { 
                display: block;
                width: 100vw; 
                height: 100vh; 
                touch-action: none;
            }
        </style>
    </head>
    <body>
        <canvas id="the_canvas_id"></canvas>
    
        <script type="module">
            /**
             * NEURAL IGNITION SEQUENCE (ABSOLUTE CALIBRATION)
             * This script force-loads the WASM engine and assets from the relative origin.
             */
            import init from './lumina_guardian.js';
            
            async function ignition() {
                try {
                    // Points directly to the WASM brain sitting next to this file
                    await init({ module_or_path: './lumina_guardian_bg.wasm' });
                    console.log("🜏 LUMINA-XENON: Neural Manifold ACTIVE");
                    
                    // PRE-LOAD GUARDIAN ASSET
                    // We manually ping the bunny image to ensure it's uncloaked in the cache
                    const guardian = new Image();
                    guardian.src = './assets/lumina_bunny.png?v=' + Date.now();
                    
                    guardian.onload = () => {
                        console.log("🜏 LUMINA-XENON: Guardian Asset UNCLOAKED");
                    };

                } catch (err) {
                    console.error("🜏 LUMINA-XENON: Ignition Failure", err);
                    
                    // FALLBACK: Use absolute path if relative fails
                    try {
                        const path = window.location.pathname;
                        const dir = path.substring(0, path.lastIndexOf('/'));
                        const wasmPath = `${window.location.origin}${dir}/lumina_guardian_bg.wasm`;
                        await init({ module_or_path: wasmPath });
                    } catch (finalErr) {
                        console.log("Critical Logic Breach: Check filename capitalization.");
                    }
                }
            }

            ignition();
        </script>
    </body>
</html>
