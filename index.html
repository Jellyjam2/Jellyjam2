<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>SOVEREIGN CORE // LOGIC</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    
    <style>
        html, body {
            margin: 0;
            padding: 0;
            background-color: #000000; 
            height: 100%;
            width: 100%;
            overflow: hidden; 
            font-family: 'Courier New', monospace;
        }
        canvas { 
            display: block; 
            position: absolute; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            z-index: 1; 
        }
        #status {
            position: absolute; bottom: 20px; left: 20px;
            color: #00ffff; /* CYAN for Logic Core */
            font-size: 14px; z-index: 10;
            pointer-events: none;
            text-shadow: 0 0 5px #00ffff;
        }
    </style>

    <link data-trunk rel="rust" data-wasm-opt="z" />
    
    <script type="module">
        // === THE LOGIC CORE (NO DOWNLOAD REQUIRED) ===
        window.sovereign = {};
        let hasGreeted = false;

        // 1. VOCAL SYNTHESIS (The Voice)
        let luminaVoices = [];

        function refreshLuminaVoices() {
            if (!window.speechSynthesis) return [];
            luminaVoices = window.speechSynthesis.getVoices() || [];
            return luminaVoices;
        }

        function selectLuminaVoice() {
            const voices = luminaVoices.length ? luminaVoices : refreshLuminaVoices();

            const preferredNames = [
                "Microsoft Aria Online",
                "Microsoft Jenny Online",
                "Microsoft Guy Online",
                "Microsoft Zira",
                "Microsoft Hazel",
                "Microsoft David",
                "Google UK English Female",
                "Google UK English Male",
                "Google US English",
                "Natural"
            ];

            for (const name of preferredNames) {
                const match = voices.find(v =>
                    v.name.toLowerCase().includes(name.toLowerCase())
                );
                if (match) return match;
            }

            return voices.find(v => v.lang && v.lang.toLowerCase().startsWith("en")) || voices[0] || null;
        }

        refreshLuminaVoices();

        if (window.speechSynthesis) {
            window.speechSynthesis.onvoiceschanged = refreshLuminaVoices;
        }

        async function speakLuminaPremium(text) {
            try {
                const response = await fetch("http://127.0.0.1:8787/speak", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ text })
                });

                if (!response.ok) {
                    throw new Error("Premium voice proxy unavailable");
                }

                const audioBlob = await response.blob();
                const audioUrl = URL.createObjectURL(audioBlob);
                const audio = new Audio(audioUrl);

                audio.onended = () => URL.revokeObjectURL(audioUrl);
                await audio.play();

                return true;
            } catch (error) {
                console.warn("Premium voice unavailable, falling back to native browser voice:", error);
                return false;
            }
        }
        async function speakJarvis(text) {
            if (await speakLuminaPremium(text)) return;
            if (!window.speechSynthesis) return;

            window.speechSynthesis.cancel();

            const msg = new SpeechSynthesisUtterance(text);
            const voice = selectLuminaVoice();

            if (voice) {
                msg.voice = voice;
            }

            msg.rate = 0.92;
            msg.pitch = 0.82;
            msg.volume = 1.0;

            window.speechSynthesis.speak(msg);
        }

        // 2. THE LUMINA AI CORE
        async function askLuminaBrain(text) {
            try {
                const response = await fetch("http://127.0.0.1:8788/think", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ text })
                });

                if (!response.ok) {
                    throw new Error("Lumina AI core unavailable");
                }

                const data = await response.json();
                return { reply: data.reply || null, mode: data.mode || "ai", model: data.model || "" };
            } catch (error) {
                console.warn("Lumina AI core unavailable. Using local fallback:", error);
                return null;
            }
        }

        function localLuminaFallback(input) {
            if (input.includes("hello") || input.includes("hi")) {
                return "Lumina online. Local core active. Hello, Enrico.";
            }

            if (input.includes("status") || input.includes("report")) {
                return "Local systems nominal. Neural core unavailable, but the cockpit remains operational.";
            }

            if (input.includes("who are you") || input.includes("identify")) {
                return "I am Lumina. A local-first sovereign cockpit interface built for Enrico.";
            }

            if (input.includes("mission") || input.includes("objective")) {
                return "Mission profile: assist, protect clarity, accelerate engineering, and keep the command path disciplined.";
            }

            if (input.includes("scan")) {
                return "Surface scan complete. No hostile logic detected in local command space.";
            }

            if (input.includes("overdrive")) {
                return "Overdrive acknowledged. Visual core remains stable. Command discipline recommended.";
            }

            if (input.includes("thank")) {
                return "Acknowledged, Enrico. Standing by.";
            }

            const fallbacks = [
                "Command received. Neural core is offline, but local logic remains ready.",
                "Logged. Bring the neural core online for full intelligence mode.",
                "Local mode response complete. Awaiting next command.",
                "Signal captured. Cockpit remains active."
            ];

            return fallbacks[Math.floor(Math.random() * fallbacks.length)];
        }

        window.sovereign.processInput = async function(text) {
            const status = document.getElementById("status");
            const rawInput = text.trim();

            if (!rawInput) return;

            status.innerText = ">> LOCAL AI CORE: THINKING...";

            let brain = await askLuminaBrain(rawInput);
            let response = brain ? brain.reply : null;

            if (!response) {
                status.innerText = ">> SCRIPT FALLBACK: LOCAL AI CORE OFFLINE";
                response = localLuminaFallback(rawInput.toLowerCase());
            }

            if (brain && brain.mode) {
                status.innerText = `>> ${brain.mode.toUpperCase()} LOCAL CORE: RESPONSE READY`;
            }

            console.log(`LUMINA [${brain && brain.mode ? brain.mode : "fallback"}]:`, response);

            const shortStatus = response.length > 90 ? response.slice(0, 90) + "..." : response;
            status.innerText = ">> " + shortStatus.toUpperCase();

            await speakJarvis(response);

            setTimeout(() => {
                status.innerText = ">> LUMINA CORE: ONLINE";
            }, 3500);
        };
        // Initialization
        window.addEventListener('click', () => {
            if (!hasGreeted) {
                speakJarvis("Logic Core Online. Welcome back, Enrico.");
                hasGreeted = true;
                document.getElementById("status").innerText = ">> LOGIC CORE: ONLINE";
            }
        }, { once: true });

    </script>
</head>
<body>
    <div id="status">>> SYSTEM READY. CLICK TO INITIALIZE LOGIC CORE.</div>
    <canvas id="the_canvas_id"></canvas>
</body>
</html>
